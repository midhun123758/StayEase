---
name: StayEase CI/CD

'on':
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}

jobs:

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create StayEase .env
        run: |
          cat > StayEase/.env << EOF
          SECRET_KEY=${{ secrets.DJANGO_STAYEASE_SECRET_KEY }}

          DB_NAME=${{ secrets.STAYEASE_DB_NAME }}
          DB_USER=${{ secrets.STAYEASE_DB_USER }}
          DB_PASSWORD=${{ secrets.STAYEASE_DB_PASSWORD }}
          DB_HOST=stayease_db
          DB_PORT=5432
          EOF

      - name: Create AI Service .env
        run: |
          cat > Ai_service/.env << EOF
          SECRET_KEY=${{ secrets.AI_SERVICE_SECRET_KEY }}

          DB_NAME=${{ secrets.STAYEASE_DB_NAME }}
          DB_USER=${{ secrets.STAYEASE_DB_USER }}
          DB_PASSWORD=${{ secrets.STAYEASE_DB_PASSWORD }}
          DB_HOST=stayease_db
          DB_PORT=5432
          EOF

      - name: Start dependencies
        run: docker compose up -d stayease_db stayease_redis

      - name: Wait for DB
        run: |
          until docker compose exec stayease_db pg_isready -U ${{ secrets.STAYEASE_DB_USER }}
          do
            echo "Waiting for postgres..."
            sleep 2
          done

      - name: Run StayEase tests
        run: docker compose run --rm test

      - name: Cleanup
        run: docker compose down

  build:
    name: Build and Push
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push StayEase image
        run: |
          docker build -t ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:stayease-${{ github.sha }} ./StayEase

          docker tag \
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:stayease-${{ github.sha }} \
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:stayease-latest

          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:stayease-${{ github.sha }}
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:stayease-latest

      - name: Build and push AI Service image
        run: |
          docker build -t ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:ai-${{ github.sha }} ./Ai_service

          docker tag \
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:ai-${{ github.sha }} \
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:ai-latest

          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:ai-${{ github.sha }}
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:ai-latest

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            cd /home/ubuntu/StayEase

            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
              docker login --username AWS \
              --password-stdin ${{ secrets.ECR_REGISTRY }}

            docker pull ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:stayease-latest
            docker pull ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:ai-latest

            cat > StayEase/.env << EOF
            SECRET_KEY=${{ secrets.DJANGO_STAYEASE_SECRET_KEY }}

            DB_NAME=${{ secrets.STAYEASE_DB_NAME }}
            DB_USER=${{ secrets.STAYEASE_DB_USER }}
            DB_PASSWORD=${{ secrets.STAYEASE_DB_PASSWORD }}
            DB_HOST=stayease_db
            DB_PORT=5432
            EOF

            cat > Ai_service/.env << EOF
            SECRET_KEY=${{ secrets.AI_SERVICE_SECRET_KEY }}

            DB_NAME=${{ secrets.STAYEASE_DB_NAME }}
            DB_USER=${{ secrets.STAYEASE_DB_USER }}
            DB_PASSWORD=${{ secrets.STAYEASE_DB_PASSWORD }}
            DB_HOST=stayease_db
            DB_PORT=5432
            EOF

            docker compose run --rm stayease_web python manage.py migrate
            docker compose run --rm ai_service python manage.py migrate

            docker compose up -d --no-deps \
              stayease_web \
              ai_service \
              celery \
              celery_beat \
              nginx

            docker image prune -f
