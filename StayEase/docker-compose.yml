services:
  web:
    build: .
    container_name: stayease_web
    command: daphne -b 0.0.0.0 -p 8000 StayEase.asgi:application
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis   # ✅ add this
    networks:
      - stayease_network
  db:
    image: postgres:15
    container_name: stayease_db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    networks:
      - stayease_network

  redis:
    image: redis:7
    container_name: stayease_redis
    ports:
      - "6379:6379"
    networks:
      - stayease_network

volumes:
  postgres_data:

networks:
  stayease_network:
    external: true