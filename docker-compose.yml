services:
  stayease_web:
    build: ./StayEase
    container_name: stayease_web
    command: daphne -b 0.0.0.0 -p 8000 StayEase.asgi:application
    volumes:
      - ./StayEase:/app
    ports:
      - "8000:8000"
    env_file:
      - ./StayEase/.env
    depends_on:
      - stayease_db
      - stayease_redis
    networks:
      - stayease_network

  stayease_db:
    image: postgres:15
    container_name: stayease_db
    environment:
      POSTGRES_DB: ${STAYEASE_DB_NAME}
      POSTGRES_USER: ${STAYEASE_DB_USER}
      POSTGRES_PASSWORD: ${STAYEASE_DB_PASSWORD}
    volumes:
      - stayease_postgres_data:/var/lib/postgresql/data/
    networks:
      - stayease_network

  stayease_redis:
    image: redis:7
    container_name: stayease_redis
    ports:
      - "6379:6379"
    networks:
      - stayease_network

  owner_service:
    build: ./owner_service
    container_name: owner_service
    command: python manage.py runserver 0.0.0.0:8001
    volumes:
      - ./owner_service:/app
    ports:
      - "8001:8001"
    env_file:
      - ./owner_service/.env
    depends_on:
      - owner_db
      - owner_redis
    networks:
      - stayease_network

  owner_db:
    image: postgres:15
    container_name: owner_db
    environment:
      POSTGRES_DB: ${OWNER_DB_NAME}
      POSTGRES_USER: ${OWNER_DB_USER}
      POSTGRES_PASSWORD: ${OWNER_DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - owner_postgres_data:/var/lib/postgresql/data/
    networks:
      - stayease_network

  owner_redis:
    image: redis:7
    container_name: owner_redis
    ports:
      - "6380:6379"
    networks:
      - stayease_network

  nginx:
    image: nginx:latest
    container_name: stayease_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - stayease_web
      - owner_service
    networks:
      - stayease_network

volumes:
  stayease_postgres_data:
  owner_postgres_data:

networks:
  stayease_network:
    driver: bridge