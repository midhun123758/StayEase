services:

  stayease_web:
    build: ./StayEase
    container_name: stayease_web

    command: daphne -b 0.0.0.0 -p 8000 StayEase.asgi:application

    volumes:
      - ./StayEase:/app

    ports:
      - "8000:8000"

    env_file:
      - ./StayEase/.env

    depends_on:
      - stayease_db
      - stayease_redis

    networks:
      - stayease_network


  stayease_db:
    image: postgres:15
    container_name: stayease_db

    environment:
      POSTGRES_DB: ${STAYEASE_DB_NAME}
      POSTGRES_USER: ${STAYEASE_DB_USER}
      POSTGRES_PASSWORD: ${STAYEASE_DB_PASSWORD}

    volumes:
      - stayease_postgres_data:/var/lib/postgresql/data/

    networks:
      - stayease_network


  stayease_redis:
    image: redis:7
    container_name: stayease_redis

    ports:
      - "6379:6379"

    networks:
      - stayease_network


  ai_service:
    build: ./Ai_service
    container_name: ai_service

    command: python manage.py runserver 0.0.0.0:8001

    volumes:
      - ./Ai_service:/app

    ports:
      - "8002:8001"

    env_file:
      - ./Ai_service/.env

    depends_on:
      - stayease_db
      - stayease_redis

    networks:
      - stayease_network


  nginx:
    image: nginx:latest
    container_name: stayease_nginx

    ports:
      - "80:80"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - stayease_web
      - ai_service

    networks:
      - stayease_network


  celery:
    build: ./StayEase
    container_name: stayease_celery

    command: celery -A StayEase worker -l info

    volumes:
      - ./StayEase:/app

    env_file:
      - ./StayEase/.env

    depends_on:
      - stayease_db
      - stayease_redis

    networks:
      - stayease_network


  celery_beat:
    build: ./StayEase
    container_name: stayease_celery_beat

    command: >
      sh -c "rm -f celerybeat-schedule &&
             celery -A StayEase beat -l info"

    volumes:
      - ./StayEase:/app

    env_file:
      - ./StayEase/.env

    depends_on:
      - stayease_db
      - stayease_redis

    networks:
      - stayease_network


  test:
    build: ./StayEase

    command: python manage.py check

    volumes:
      - ./StayEase:/app

    env_file:
      - ./StayEase/.env

    depends_on:
      - stayease_db
      - stayease_redis

    networks:
      - stayease_network



  ai_test:
    build: ./Ai_service

    command: python manage.py check

    volumes:
      - ./Ai_service:/app

    env_file:
      - ./Ai_service/.env

    depends_on:
      - stayease_db
      - stayease_redis

    networks:
      - stayease_network

volumes:
  stayease_postgres_data:
    name: stayease_postgres_data


networks:
  stayease_network:
    driver: bridge


  