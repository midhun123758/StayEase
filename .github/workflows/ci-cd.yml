name: StayEase CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create root compose env
        run: |
          cat > .env << EOF
          ECR_REGISTRY=dummy
          ECR_REPOSITORY=dummy
          STAYEASE_DB_NAME=${{ secrets.STAYEASE_DB_NAME }}
          STAYEASE_DB_USER=${{ secrets.STAYEASE_DB_USER }}
          STAYEASE_DB_PASSWORD=${{ secrets.STAYEASE_DB_PASSWORD }}
          EOF

      - name: Create StayEase env
        run: |
          cat > StayEase/.env << EOF
          SECRET_KEY=${{ secrets.DJANGO_STAYEASE_SECRET_KEY }}
          DB_NAME=${{ secrets.STAYEASE_DB_NAME }}
          DB_USER=${{ secrets.STAYEASE_DB_USER }}
          DB_PASSWORD=${{ secrets.STAYEASE_DB_PASSWORD }}
          DB_HOST=stayease_db
          DB_PORT=5432
          RABBITMQ_HOST=rabbitmq
          RABBITMQ_PORT=5672
          EOF

      - name: Create AI Service env
        run: |
          cat > Ai_service/.env << EOF
          SECRET_KEY=${{ secrets.AI_SERVICE_SECRET_KEY }}
          RABBITMQ_HOST=rabbitmq
          RABBITMQ_PORT=5672
          QDRANT_HOST=qdrant
          QDRANT_PORT=6333
          EOF

      - name: Start dependencies
        run: docker compose up -d stayease_db stayease_redis rabbitmq

      - name: Wait for DB
        run: |
          until docker compose exec -T stayease_db pg_isready -U ${{ secrets.STAYEASE_DB_USER }} -d ${{ secrets.STAYEASE_DB_NAME }}
          do
            echo "Waiting for postgres..."
            sleep 2
          done

      - name: Run StayEase tests
        run: docker compose run --rm test

      - name: Cleanup
        if: always()
        run: docker compose down

  build:
    name: Build and Push Core Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push StayEase image
        run: |
          ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}

          docker build \
            -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:stayease-${{ github.sha }} \
            ./StayEase

          docker tag \
            $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:stayease-${{ github.sha }} \
            $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:stayease-latest

          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:stayease-${{ github.sha }}
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:stayease-latest

  deploy:
    name: Deploy Core App
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy core app to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -e

            cd /home/ubuntu/StayEase

            echo "===== UPDATE REPO ON EC2 ====="
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            echo "===== SAFE EC2 CLEANUP ====="
            sudo rm -rf /tmp/* || true
            sudo rm -rf /var/tmp/* || true
            sudo apt-get clean || true
            sudo journalctl --vacuum-time=1d || true
            sudo find /var/lib/docker/containers/ -name "*-json.log" -type f -exec sudo truncate -s 0 {} \; || true
            docker container prune -f || true
            docker image prune -af || true
            docker builder prune -af || true
            docker network prune -f || true

            echo "===== AWS CONFIG ====="
            export AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            export AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            export AWS_DEFAULT_REGION=${{ secrets.AWS_REGION }}

            AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
            ECR_REGISTRY="$AWS_ACCOUNT_ID.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com"
            ECR_REPOSITORY=${{ env.ECR_REPOSITORY }}

            echo "===== CREATE ROOT COMPOSE ENV ====="
            cat > .env << EOF
            ECR_REGISTRY=$ECR_REGISTRY
            ECR_REPOSITORY=$ECR_REPOSITORY
            STAYEASE_DB_NAME=${{ secrets.STAYEASE_DB_NAME }}
            STAYEASE_DB_USER=${{ secrets.STAYEASE_DB_USER }}
            STAYEASE_DB_PASSWORD=${{ secrets.STAYEASE_DB_PASSWORD }}
            EOF

            echo "===== ECR LOGIN ====="
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin $ECR_REGISTRY

            echo "===== PULL DJANGO IMAGE ONLY ====="
            docker pull $ECR_REGISTRY/$ECR_REPOSITORY:stayease-latest

            echo "===== CREATE DJANGO ENV ====="
            cat > StayEase/.env << EOF
            SECRET_KEY=${{ secrets.DJANGO_STAYEASE_SECRET_KEY }}
            DB_NAME=${{ secrets.STAYEASE_DB_NAME }}
            DB_USER=${{ secrets.STAYEASE_DB_USER }}
            DB_PASSWORD=${{ secrets.STAYEASE_DB_PASSWORD }}
            DB_HOST=stayease_db
            DB_PORT=5432
            RABBITMQ_HOST=rabbitmq
            RABBITMQ_PORT=5672
            EOF

            echo "===== CREATE AI ENV PLACEHOLDER ====="
            cat > Ai_service/.env << EOF
            SECRET_KEY=${{ secrets.AI_SERVICE_SECRET_KEY }}
            RABBITMQ_HOST=rabbitmq
            RABBITMQ_PORT=5672
            QDRANT_HOST=qdrant
            QDRANT_PORT=6333
            EOF

            echo "===== START CORE DEPENDENCIES ONLY ====="
            docker-compose up -d --no-build stayease_db stayease_redis rabbitmq

            echo "===== MIGRATE DJANGO ONLY ====="
            docker-compose run --rm --no-deps stayease_web python manage.py migrate

            echo "===== RESTART CORE APP ONLY ====="
            docker-compose up -d --no-build stayease_web celery celery_beat

            echo "===== STATUS ====="
            docker ps
