# /docker-compose.yml  (root level)
services:

  # ── Django ──────────────────────────────
  stayease_web:
    build: ./StayEase
    container_name: stayease_web
    command: daphne -b 0.0.0.0 -p 8000 StayEase.asgi:application
    volumes:
      - ./StayEase:/app
    ports:
      - "8000:8000"
    env_file:
      - ./StayEase/.env
    depends_on:
      - stayease_db
      - stayease_redis
      - rabbitmq          # ← Django signal rabbitmq-ലേക്ക് publish ചെയ്യുന്നു
    networks:
      - stayease_network

  stayease_db:
    image: postgres:15
    container_name: stayease_db
    environment:
      POSTGRES_DB: ${STAYEASE_DB_NAME}
      POSTGRES_USER: ${STAYEASE_DB_USER}
      POSTGRES_PASSWORD: ${STAYEASE_DB_PASSWORD}
    volumes:
      - stayease_postgres_data:/var/lib/postgresql/data/
    networks:
      - stayease_network

  stayease_redis:
    image: redis:7
    container_name: stayease_redis
    ports:
      - "6379:6379"
    networks:
      - stayease_network

  celery:
    build: ./StayEase
    container_name: stayease_celery
    command: celery -A StayEase worker -l info
    volumes:
      - ./StayEase:/app
    env_file:
      - ./StayEase/.env
    depends_on:
      - stayease_db
      - stayease_redis
    networks:
      - stayease_network

  celery_beat:
    build: ./StayEase
    container_name: stayease_celery_beat
    command: >
      sh -c "rm -f celerybeat-schedule &&
             celery -A StayEase beat -l info"
    volumes:
      - ./StayEase:/app
    env_file:
      - ./StayEase/.env
    depends_on:
      - stayease_db
      - stayease_redis
    networks:
      - stayease_network

  # ── Message Broker ───────────────────────
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - stayease_network

  # ── Vector Store ─────────────────────────
  qdrant:
    image: qdrant/qdrant
    container_name: qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - stayease_network

  # ── FastAPI AI Service ────────────────────
  ai_service:
    build: ./Ai_service
    container_name: ai_service
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload
    volumes:
      - ./Ai_service:/app
    ports:
      - "8002:8001"
    env_file:
      - ./Ai_service/.env
    depends_on:
      - rabbitmq
      - qdrant
    networks:
      - stayease_network

  # ── AI Worker (RabbitMQ consumer) ─────────
  ai_worker:
    build: ./Ai_service
    container_name: ai_worker
    command: python -m app.worker
    volumes:
      - ./Ai_service:/app
    env_file:
      - ./Ai_service/.env
    depends_on:
      - rabbitmq
      - qdrant
    networks:
      - stayease_network

  # ── Nginx ─────────────────────────────────
  nginx:
    image: nginx:latest
    container_name: stayease_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - stayease_web
      - ai_service
    networks:
      - stayease_network

volumes:
  stayease_postgres_data:
  qdrant_data:

networks:
  stayease_network:
    driver: bridge