server {
    listen 80;

    location /api/ {
        proxy_pass http://stayease_web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /owner/ {
        proxy_pass http://owner_service:8001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}