name: StayEase CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create root compose env
        run: |
          cat > .env << EOF
          STAYEASE_DB_NAME=${{ secrets.STAYEASE_DB_NAME }}
          STAYEASE_DB_USER=${{ secrets.STAYEASE_DB_USER }}
          STAYEASE_DB_PASSWORD=${{ secrets.STAYEASE_DB_PASSWORD }}
          ECR_REGISTRY=${{ secrets.ECR_REGISTRY }}
          ECR_REPOSITORY=${{ secrets.ECR_REPOSITORY }}
          EOF

      - name: Create StayEase .env
        run: |
          cat > StayEase/.env << EOF
          SECRET_KEY=${{ secrets.DJANGO_STAYEASE_SECRET_KEY }}
          DB_NAME=${{ secrets.STAYEASE_DB_NAME }}
          DB_USER=${{ secrets.STAYEASE_DB_USER }}
          DB_PASSWORD=${{ secrets.STAYEASE_DB_PASSWORD }}
          DB_HOST=stayease_db
          DB_PORT=5432
          RABBITMQ_HOST=rabbitmq
          RABBITMQ_PORT=5672
          EOF

      - name: Create AI Service .env
        run: |
          cat > Ai_service/.env << EOF
          SECRET_KEY=${{ secrets.AI_SERVICE_SECRET_KEY }}
          RABBITMQ_HOST=rabbitmq
          RABBITMQ_PORT=5672
          QDRANT_HOST=qdrant
          QDRANT_PORT=6333
          EOF

      - name: Start dependencies
        run: docker compose up -d stayease_db stayease_redis rabbitmq

      - name: Wait for DB
        run: |
          until docker compose exec -T stayease_db pg_isready -U ${{ secrets.STAYEASE_DB_USER }} -d ${{ secrets.STAYEASE_DB_NAME }}
          do
            echo "Waiting for postgres..."
            sleep 2
          done

      - name: Run StayEase tests
        run: docker compose run --rm test

      - name: Cleanup
        if: always()
        run: docker compose down

  build:
    name: Build and Push
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push StayEase image
        run: |
          docker build \
            -t ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:stayease-${{ github.sha }} \
            ./StayEase

          docker tag \
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:stayease-${{ github.sha }} \
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:stayease-latest

          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:stayease-${{ github.sha }}
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:stayease-latest

      - name: Build and push AI Service image
        run: |
          docker build \
            -t ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:ai-${{ github.sha }} \
            ./Ai_service

          docker tag \
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:ai-${{ github.sha }} \
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:ai-latest

          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:ai-${{ github.sha }}
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:ai-latest

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -e

            cd /home/ubuntu/StayEase

            echo "===== BEFORE CLEAN ====="
            df -h || true
            docker system df || true

            echo "===== SAFE EC2 CLEANUP ====="
            sudo rm -rf /tmp/* || true
            sudo rm -rf /var/tmp/* || true
            sudo apt-get clean || true
            sudo journalctl --vacuum-time=1d || true

            sudo find /var/lib/docker/containers/ \
              -name "*-json.log" \
              -type f \
              -exec sudo truncate -s 0 {} \; || true

            docker container prune -f || true
            docker image prune -af || true
            docker builder prune -af || true
            docker network prune -f || true

            echo "===== AFTER CLEAN ====="
            df -h || true
            docker system df || true

            echo "===== AWS LOGIN ====="
            export AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            export AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            export AWS_DEFAULT_REGION=${{ secrets.AWS_REGION }}

            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
              docker login --username AWS \
              --password-stdin ${{ secrets.ECR_REGISTRY }}

            echo "===== PULL IMAGES ====="
            docker pull ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:stayease-latest
            docker pull ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:ai-latest

            echo "===== CREATE ROOT COMPOSE ENV ====="
            cat > .env << EOF
            ECR_REGISTRY=${{ secrets.ECR_REGISTRY }}
            ECR_REPOSITORY=${{ secrets.ECR_REPOSITORY }}
            STAYEASE_DB_NAME=${{ secrets.STAYEASE_DB_NAME }}
            STAYEASE_DB_USER=${{ secrets.STAYEASE_DB_USER }}
            STAYEASE_DB_PASSWORD=${{ secrets.STAYEASE_DB_PASSWORD }}
            EOF

            echo "===== CREATE DJANGO ENV ====="
            cat > StayEase/.env << EOF
            SECRET_KEY=${{ secrets.DJANGO_STAYEASE_SECRET_KEY }}
            DB_NAME=${{ secrets.STAYEASE_DB_NAME }}
            DB_USER=${{ secrets.STAYEASE_DB_USER }}
            DB_PASSWORD=${{ secrets.STAYEASE_DB_PASSWORD }}
            DB_HOST=stayease_db
            DB_PORT=5432
            RABBITMQ_HOST=rabbitmq
            RABBITMQ_PORT=5672
            EOF

            echo "===== CREATE AI ENV ====="
            cat > Ai_service/.env << EOF
            SECRET_KEY=${{ secrets.AI_SERVICE_SECRET_KEY }}
            RABBITMQ_HOST=rabbitmq
            RABBITMQ_PORT=5672
            QDRANT_HOST=qdrant
            QDRANT_PORT=6333
            EOF

            echo "===== MIGRATE DJANGO ====="
            docker-compose run --rm stayease_web python manage.py migrate

            echo "===== RESTART APP ====="
            docker-compose up -d --no-build --no-deps \
              stayease_web \
              ai_service \
              celery \
              celery_beat \
              nginx

            echo "===== STATUS ====="
            docker ps
